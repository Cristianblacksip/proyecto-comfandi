[build]
  functions = "netlify/functions"
  publish   = "public"
  command   = "mkdir -p public && cp -r proyecto_comfandi/static/* public/static/ 2>/dev/null || true"

[build.environment]
  PYTHON_VERSION = "3.11"

# Archivos estáticos → servidos directo por CDN de Netlify (publish dir)
[[redirects]]
  from   = "/static/*"
  to     = "/static/:splat"
  status = 200

# Todo lo demás → función serverless Flask
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200
