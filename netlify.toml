[build]
  functions = "netlify/functions"
  publish   = "public"
  # Comando corregido: ahora los archivos están en la raíz
  command   = "mkdir -p public/static && cp -r static/* public/static/ 2>/dev/null || true"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from   = "/static/*"
  to     = "/static/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200